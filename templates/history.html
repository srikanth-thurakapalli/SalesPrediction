{% extends 'base.html' %}

{% block content %}

<h2>Prediction History</h2>

<table border="1">

<tr>

<th>Date</th>

<th>Category</th>

<th>Quantity</th>

<th>Discount</th>

<th>Prediction</th>

</tr>

{% for p in predictions %}

<tr>

<td>{{ p.created_at }}</td>

<td>{{ p.category }}</td>

<td>{{ p.quantity }}</td>

<td>{{ p.discount }}</td>

<td>{{ p.predicted_sales|floatformat:2 }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
